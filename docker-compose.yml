version: '3.8'

services:
  blindtreasure.api:
    image: ${DOCKER_REGISTRY-}blindtreasureapi
    build:
      context: .
      dockerfile: BlindTreasure.API/Dockerfile
    depends_on:
      blindtreasure.database:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=blindtreasure.database;Port=5432;Database=BlindTreasureDb;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=redis:6379,abortConnect=false
      - JWT__SecretKey=BlindTreasure_SECRETKEY_SIEUCAPBAOMAT_VAYMACHUADU16KYTU
      - JWT__Issuer=BlindTreasure_Issuer
      - JWT__Audience=BlindTreasure_Audience
      - RESEND_APITOKEN=re_gQNBXJvY_ANFdgQphKQBxdW5DNf2UG6Zk
      - RESEND_FROM=noreply@ae-tao-fullstack-api.site
    ports:
      - "5000:5000"

  blindtreasure.database:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blindtreasure_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:6.2
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
