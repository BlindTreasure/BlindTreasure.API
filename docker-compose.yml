version: '3.8'

services:
  blindtreasure.api:
    image: ${DOCKER_REGISTRY-}blindtreasureapi
    build:
      context: .
      dockerfile: BlindTreasure.API/Dockerfile
    depends_on:
      - blindtreasure.database
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=blindtreasure.database;Port=5432;Database=BlindTreasureDb;Username=postgres;Password=postgres
      - "JWT__SecretKey=BlindTreasure_SECRETKEY_SIEUCAPBAOMAT_VAYMACHUADU16KYTU"
      - "JWT__Issuer=BlindTreasure_Issuer"
      - "JWT__Audience=BlindTreasure_Audience"
    ports:
      - "5000:5000"

  blindtreasure.database:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blindtreasure_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
